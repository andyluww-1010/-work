<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>p5.js 互動幾何畫布 - 期末專案</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
</head>
<body>

    <div id="landing-page">
        <div class="card">
            <h1>數位幾何流體畫布123</h1>
            <p class="desc">這是一個基於 p5.js 開發的生成藝術空間。</p>
            <div class="instructions">
                <h3>互動指南：</h3>
                <ul>
                    <li>🖱️ <strong>移動滑鼠</strong>：吸引粒子並改變其核心引力。</li>
                    <li>🖱️ <strong>點擊滑鼠</strong>：在當前位置炸裂出更多色彩粒子。</li>
                    <li>⌨️ <strong>按下空白鍵 (Space)</strong>：切換粒子連線模式 / 清空背景。</li>
                </ul>
            </div>
            <button id="start-btn">進入體驗</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
